<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="w-screen h-screen overflow-hidden flex">

  <header class="h-screen w-[30vw] flex flex-col justify-center">
    <div class="flex flex-col m-auto">
      <h1 class="font-bold text-6xl py-6">Credia</h1>
      <a href="./index.html" class="py-1 text-gray-900 font-medium">Home</a>
      <a href="./about.html" class=" py-1 text-gray-600">About</a>
      <a href="./portfolio.html" class="py-1 text-gray-600">Portfolio</a>
      <a href="./contact.html" class="py-1 text-gray-600">Contact</a>
      <p class="py-3 italic text-gray-400">@2021 TailTemplate</p>
    </div>
  </header>

  <main class="h-full w-full bg-gray-100 overflow-x-auto flex justify-center">
    <div class="w-4/5 m-auto flex flex-col">
      <h3 class="w-fit bg-gray-300 p-2 font-medium">Contact</h3>
      <h2 class="text-xl font-bold py-4">Get in Touch</h2>
      <form class="flex flex-col">
        <label class="font-bold py-2" for="name">Name</label>
        <input class="rounded p-3 bg-gray-300 placeholder:text-gray-500 placeholder:font-medium" type="text" id="name"
          placeholder="Name">
        <label class="font-bold py-2" for="email">E-mail</label>
        <input class="rounded p-3 bg-gray-300 placeholder:text-gray-500 placeholder:font-medium" type="email" id="email"
          placeholder="E-mail">
        <label class="font-bold py-2" for="message">Message</label>
        <textarea class="rounded p-3 bg-gray-300 placeholder:text-gray-500 placeholder:font-medium" name="message"
          id="message" placeholder="Message"></textarea>
        <Button class="w-fit my-4 py-2 px-4 bg-black text-white font-bold rounded">Send</Button>
      </form>
    </div>
  </main>

</body>

</html>
