<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
    <meta name="robots" content="noindex">
    <title>Jelle Wijma | Admin</title>
    <link rel="stylesheet" href="/assets/css/tailwind.generated.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <script src="/assets/js/runtime-config.js" defer></script>
    <script src="/assets/js/admin.js" defer></script>
</head>

<body class="bg-black text-white overflow-x-hidden">
    <main class="min-h-screen">
        <section class="grid min-h-screen xl:grid-cols-[0.8fr_1.2fr]">
            <aside class="border-b border-[#ffffff26] p-6 sm:p-12 xl:border-b-0 xl:border-r">
                <a href="/index.html" class="text-base font-bold tracking-[0.08em]">JelleWijma</a>
                <h1 class="mt-10 text-5xl font-bold leading-none sm:text-7xl">Admin</h1>
                <p id="admin-status" class="mt-6 leading-7 text-[#ffffffb3]">Sign in to manage gallery photos and projects.</p>
                <button type="button" id="logout-button"
                    class="mt-8 hidden border border-[#ffffff40] px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-[#ffffffcc] transition hover:border-white hover:text-white">Log
                    out</button>
            </aside>

            <div class="p-6 sm:p-12">
                <form id="login-form" class="max-w-xl">
                    <label class="block">
                        <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Email</span>
                        <input type="email" id="admin-email" autocomplete="email" required
                            class="mt-3 w-full border border-[#ffffff40] bg-black px-4 py-3 text-white">
                    </label>
                    <button type="submit"
                        class="mt-6 border border-white px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-white">Send
                        link</button>
                </form>

                <div id="admin-panel" class="hidden">
                    <section class="border-b border-[#ffffff26] pb-10">
                        <h2 class="text-3xl font-bold">Photo</h2>
                        <form id="photo-form" class="mt-6 grid gap-4">
                            <input type="hidden" id="photo-id">
                            <label class="block">
                                <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Title</span>
                                <input id="photo-title" required class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                            </label>
                            <label class="block">
                                <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Alt text</span>
                                <input id="photo-alt" required class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                            </label>
                            <div class="grid gap-4 sm:grid-cols-3">
                                <label class="block">
                                    <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Category</span>
                                    <select id="photo-category" class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                                        <option value="car">Car</option>
                                        <option value="landscape">Landscape</option>
                                        <option value="street">Street</option>
                                    </select>
                                </label>
                                <label class="block">
                                    <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Order</span>
                                    <input id="photo-order" type="number" value="0" class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                                </label>
                                <label class="flex items-end gap-3 pb-3">
                                    <input id="photo-published" type="checkbox" checked>
                                    <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Published</span>
                                </label>
                            </div>
                            <label class="block">
                                <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Image</span>
                                <input id="photo-file" type="file" accept="image/*"
                                    class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                            </label>
                            <div class="flex flex-wrap gap-3">
                                <button type="submit"
                                    class="border border-white px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-white">Save
                                    photo</button>
                                <button type="button" id="photo-reset"
                                    class="border border-[#ffffff40] px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-[#ffffffcc]">New</button>
                            </div>
                        </form>
                        <div id="photo-list" class="mt-8 grid gap-3"></div>
                    </section>

                    <section class="pt-10">
                        <h2 class="text-3xl font-bold">Project</h2>
                        <form id="project-form" class="mt-6 grid gap-4">
                            <input type="hidden" id="project-id">
                            <label class="block">
                                <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Title</span>
                                <input id="project-title" required class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                            </label>
                            <label class="block">
                                <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Description</span>
                                <textarea id="project-description" rows="4" required
                                    class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3"></textarea>
                            </label>
                            <div class="grid gap-4 sm:grid-cols-2">
                                <label class="block">
                                    <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">URL</span>
                                    <input id="project-url" type="url" required class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                                </label>
                                <label class="block">
                                    <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Image alt</span>
                                    <input id="project-image-alt" required class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                                </label>
                            </div>
                            <div class="grid gap-4 sm:grid-cols-3">
                                <label class="block">
                                    <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Order</span>
                                    <input id="project-order" type="number" value="0" class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                                </label>
                                <label class="flex items-end gap-3 pb-3">
                                    <input id="project-featured" type="checkbox" checked>
                                    <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Featured</span>
                                </label>
                                <label class="flex items-end gap-3 pb-3">
                                    <input id="project-published" type="checkbox" checked>
                                    <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Published</span>
                                </label>
                            </div>
                            <label class="block">
                                <span class="text-sm uppercase tracking-[0.2em] text-[#ffffff99]">Image</span>
                                <input id="project-file" type="file" accept="image/*"
                                    class="mt-2 w-full border border-[#ffffff40] bg-black px-4 py-3">
                            </label>
                            <div class="flex flex-wrap gap-3">
                                <button type="submit"
                                    class="border border-white px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-white">Save
                                    project</button>
                                <button type="button" id="project-reset"
                                    class="border border-[#ffffff40] px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-[#ffffffcc]">New</button>
                            </div>
                        </form>
                        <div id="project-list" class="mt-8 grid gap-3"></div>
                    </section>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
